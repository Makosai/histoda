version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.3-alpine
    container_name: histoda-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./config/config.xml:/etc/clickhouse-server/config.d/config.xml:ro
      - ./config/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
      - ./init/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=default
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingest-daemon:
    image: node:20-alpine
    container_name: histoda-ingest-daemon
    restart: always
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
    command: sh -c "npm install && npm run daemon"
    depends_on:
      clickhouse:
        condition: service_healthy
